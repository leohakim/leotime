services:
  leotime:
    build:
      context: .
    ports:
      - "8080:8080"
    env_file:
      - path: .env.local
        required: false
    environment:
      # Container paths must win over dev defaults from .env.local (e.g. CI copies .env.example).
      LEOTIME_DB_PATH: /data/leotime.db
      LEOTIME_DOCUMENT_ROOT: /data/documents
      LEOTIME_STATIC_DIR: /app/public
    volumes:
      - leotime-data:/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.8.0
    profiles:
      - observability
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.3.0
    profiles:
      - observability
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped

  k6:
    image: grafana/k6:latest
    profiles:
      - tools
    volumes:
      - ./scripts/k6:/scripts:ro
    entrypoint:
      - k6

volumes:
  leotime-data:
  prometheus-data:
  grafana-data:
