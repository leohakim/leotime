name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      - name: Check gofmt
        run: make fmt-check

      - name: Run go vet
        run: make test-api-vet

      - name: Run Go tests
        run: make test-api

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: make test-web

      - name: Build frontend
        run: make build-web

  e2e:
    name: Playwright
    runs-on: ubuntu-latest
    needs: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Run Playwright smoke test
        run: make test-e2e
        env:
          CI: true

  audit-ui-smoke:
    name: UI accessibility audit
    runs-on: ubuntu-latest
    needs: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Run UI accessibility audit smoke
        run: make audit-ui-smoke
        env:
          CI: true

  audit-ui-regression:
    name: UI visual regression
    runs-on: ubuntu-latest
    needs: web
    steps:
      - uses: actions/checkout@v4

      - name: Run UI visual regression
        run: |
          chmod +x scripts/run-visual-regression-linux.sh scripts/visual-regression-linux-inner.sh
          ./scripts/run-visual-regression-linux.sh
        env:
          CI: true

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs:
      - api
      - web
    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: make docker-build

  smoke:
    name: Docker smoke
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4

      - name: Prepare local env defaults
        run: cp .env.example .env.local

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for API health
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/api/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs leotime
          exit 1

      - name: Run smoke checks
        run: make smoke BASE_URL=http://127.0.0.1:8080

      - name: Stop stack
        if: always()
        run: docker compose down -v
